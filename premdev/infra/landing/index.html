<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>flixprem.org — Sedang dalam pembangunan</title>
    <meta name="description" content="Situs flixprem.org sedang dalam pembangunan." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #0b0b12;
        --bg-1: #15151f;
        --border: #2a2a3a;
        --text: #e8e8f0;
        --muted: #8a8aa0;
        --accent: #8b5cf6;
        --accent-soft: rgba(139, 92, 246, 0.15);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(ellipse at top, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
          var(--bg-0);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 520px;
        width: 100%;
        background: var(--bg-1);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 36px 32px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--accent);
        background: var(--accent-soft);
        padding: 6px 12px;
        border-radius: 999px;
        margin-bottom: 18px;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }
      .footer {
        margin-top: 28px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge"><span class="dot"></span> Coming soon</span>
      <h1>Sedang dalam pembangunan</h1>
      <p>Situs ini sedang kami siapkan. Silakan kembali lagi nanti.</p>
      <div class="footer">flixprem.org</div>
    </main>
  </body>
</html>
